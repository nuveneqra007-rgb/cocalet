<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COKELAB — Experiencia Inmersiva de Sabor</title>
    <meta name="description" content="COKELAB es una experiencia inmersiva 3D donde descubres sabores cósmicos, exploras la historia de Coca-Cola, y creas tu propia bebida personalizada. Una web futurista y ultra-premium." />
    <meta name="theme-color" content="#0A0A0A" />
    <meta property="og:title" content="COKELAB — Experiencia Inmersiva de Sabor" />
    <meta property="og:description" content="Descubre sabores cósmicos, explora la historia, y crea tu propia Coca-Cola en esta experiencia web inmersiva." />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Cpath d='M20 5C20 5 8 12 8 22C8 28 13 33 20 33C27 33 32 28 32 22C32 12 20 5 20 5Z' stroke='%23E61D2B' stroke-width='3' fill='none'/%3E%3C/svg%3E" />
    
    <!-- LCP Optimization: Preload Hero assets -->
    <!-- Preconnect to external fonts to avoid rendering blocks -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Optional: Preload critical image -->
    <!-- <link rel="preload" as="image" href="/images/products/can-classic.png" fetchpriority="high" /> -->
    
    <style>
      /* Critical CSS for instant first paint */
      body { background-color: #0A0A0A; color: white; margin: 0; font-family: sans-serif; overflow-x: hidden; }
      #root { width: 100vw; height: 100vh; }
      .initial-loader { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #0A0A0A; z-index: 99999; }
      .pulse-bottle { width: 60px; height: 60px; border: 3px solid transparent; border-top-color: #E61D2B; border-radius: 50%; animation: spin 1s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader" id="initial-loader">
        <div class="pulse-bottle"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove loader as soon as React mounts
      window.addEventListener('load', () => {
        setTimeout(() => {
          const l = document.getElementById('initial-loader');
          if(l) l.style.opacity = '0';
          setTimeout(() => { if(l) l.remove() }, 300);
        }, 100);
      });
    </script>
  </body>
</html>
